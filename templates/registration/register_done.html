{% extends "base_registration.html" %}
{% block title %}Verify Your Email{% endblock %}
{% block content %}
<div class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-80 max-w-md text-center space-y-4">
        <h2 class="text-3xl font-bold text-primary">Check your email</h2>
        <p class="text-text-secondary">We've sent a verification link to your email address. Please click the link to activate your account.</p>
        <p class="text-sm text-text-secondary">Didn't receive it? Check your spam folder.</p>
    </div>
</div>
{% endblock %}
