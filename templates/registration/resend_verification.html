{% extends "base_registration.html" %}
{% load static %}
{% load lucide %}

{% block title %}Resend Verification{% endblock %}
{% block content %}
<div class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-6">
        <div class="text-center">
            <img src="{% static 'img/gemz-logo.png' %}" alt="Gemz Software Logo" class="mx-auto h-10 w-auto">
            <h2 class="mt-3 text-3xl font-bold text-primary">Resend Verification</h2>
            <p class="mt-2 text-sm text-text-secondary">Enter your email address and we'll send a new verification link.</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <input type="email" name="email" placeholder="Email address" required
                       class="block w-full rounded-lg border py-3 pl-4 pr-4 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
            </div>
            <button type="submit" class="btn-login w-full rounded-lg py-3 text-white font-medium">Send Verification Email</button>
        </form>
        <p class="text-center text-sm text-text-secondary">
            <a href="{% url 'accounts:login' %}" class="text-primary hover:opacity-80">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
