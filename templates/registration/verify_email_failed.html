{% extends "base_registration.html" %}
{% block title %}Verification Failed{% endblock %}
{% block content %}
<div class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-80 max-w-md text-center space-y-4">
        <h2 class="text-3xl font-bold text-error">Invalid Link</h2>
        <p class="text-text-secondary">The verification link is invalid or has expired. Please register again.</p>
        <a href="{% url 'accounts:register' %}" class="btn-login inline-block rounded-full px-6 py-3 text-white">Try Again</a>
    </div>
</div>
{% endblock %}
