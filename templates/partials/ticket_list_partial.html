{% load lucide %}

{# Filter buttons (active state driven by current_status) #}
<div class="flex flex-wrap gap-2 mb-4">
    <button class="btn-ghost text-xs rounded-full px-4 py-1.5 border"
            hx-get="{% url 'tickets:my_list' %}"
            hx-target="#ticketTableContainer"
            hx-swap="innerHTML"
            style="{% if not current_status %}background-color: var(--color-primary); color: white; border-color: var(--color-primary);{% else %}border-color: var(--color-border);{% endif %}">
        All
    </button>
    {% for value, label in status_choices %}
        <button class="btn-ghost text-xs rounded-full px-4 py-1.5 border"
                hx-get="{% url 'tickets:my_list' %}?status={{ value }}"
                hx-target="#ticketTableContainer"
                hx-swap="innerHTML"
                style="{% if current_status == value %}background-color: var(--color-primary); color: white; border-color: var(--color-primary);{% else %}border-color: var(--color-border);{% endif %}">
            {{ label }}
        </button>
    {% endfor %}
</div>
