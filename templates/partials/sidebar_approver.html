{% load lucide %}

<div class="px-3">
    <a href="{% url 'tickets:approver_dashboard' %}"
       class="flex items-center justify-center p-2 rounded-sm transition sidebar-link" data-tooltip="Dashboard"
       style="{% if request.path == '/approver/' %}background-color: var(--color-primary); color: white;{% else %}color: var(--color-text-secondary);{% endif %}">
        {% lucide "layout-dashboard" size=18 class="h-4.5 w-4.5" %}
    </a>
</div>

<div class="px-3">
    <a href="{% url 'tickets:approver_pending' %}"
       class="flex items-center justify-center p-1.5 rounded-sm transition sidebar-link" data-tooltip="Pending Approvals"
       style="{% if '/approver/pending/' in request.path %}background-color: var(--color-primary); color: white;{% else %}color: var(--color-text-secondary);{% endif %}">
        {% lucide "circle-check" size=18 class="h-4.5 w-4.5" %}
    </a>
</div>

<div class="px-3">
    <a href="{% url 'tickets:approver_history' %}"
       class="flex items-center justify-center p-1.5 rounded-sm transition sidebar-link" data-tooltip="History"
       style="{% if '/approver/history/' in request.path %}background-color: var(--color-primary); color: white;{% else %}color: var(--color-text-secondary);{% endif %}">
        {% lucide "clock" size=18 class="h-4.5 w-4.5" %}
    </a>
</div>

<div class="border-t mx-2 my-1" style="border-color: var(--color-border);"></div>

<a href="{% url 'accounts:profile' %}" class="flex items-center justify-center p-1.5 rounded-sm transition sidebar-link" data-tooltip="Profile"
   style="color: var(--color-text-secondary);">
    {% lucide "circle-user" size=18 class="h-4.5 w-4.5" %}
</a>
