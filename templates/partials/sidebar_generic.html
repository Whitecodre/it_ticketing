    {% lucide "layout-dashboard" size=20 class="h-5 w-5 shrink-0" %}
    Dashboard
</a>
<a href="{% url 'accounts:profile' %}" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition"

    {% lucide "circle-user" size=20 class="h-5 w-5 shrink-0" %}
    Profile
</a>
