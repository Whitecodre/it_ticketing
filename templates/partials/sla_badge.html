{% load lucide %}

{% with sla_info=ticket.sla_status %}
<div class="flex flex-col">
    <div class="sla-bar w-24 mb-1">
        <div class="sla-bar-fill 
            {% if sla_info.overall == 'ok' %}safe
            {% elif sla_info.overall == 'warning' %}warning
            {% else %}danger{% endif %}" 
            style="width: {% if sla_info.overall == 'breached' %}100{% else %}{{ sla_info.resolution_pct|default:0 }}{% endif %}%;">
        </div>
    </div>
    <span class="sla-timer 
        {% if sla_info.overall == 'ok' %}safe
        {% elif sla_info.overall == 'warning' %}warning
        {% else %}danger{% endif %} text-xs">
        {% if sla_info.overall == 'breached' %}Breached
        {% else %}{{ sla_info.resolution_pct|default:0 }}%
        {% endif %}
    </span>
</div>
{% endwith %}
