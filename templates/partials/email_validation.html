{% if valid %}
    <div class="text-success text-xs mt-1 flex items-center gap-1">
        {% lucide "check-circle" size=14 class="text-success" %}
        {{ message }}
    </div>
{% else %}
    <div class="text-error text-xs mt-1 flex items-center gap-1">
        {% lucide "x-circle" size=14 class="text-error" %}
        {{ message }}
    </div>
{% endif %}
