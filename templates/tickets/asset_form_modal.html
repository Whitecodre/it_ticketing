{% load lucide %}

<div class="p-6">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold" style="color: var(--color-text-primary);">
            {% if action == 'create' %}Add New Asset{% else %}Edit Asset{% endif %}
        </h3>
        <button onclick="closeModal()" class="btn-ghost p-1">{% lucide "x" size=20 %}</button>
    </div>

    <form method="post"
          {% if action == 'create' %}
          action="{% url 'tickets:asset_create' %}"
          {% else %}
          action="{% url 'tickets:asset_edit' asset.pk %}"
          {% endif %}
          hx-post="{% if action == 'create' %}{% url 'tickets:asset_create' %}{% else %}{% url 'tickets:asset_edit' asset.pk %}{% endif %}"
          hx-target="#assetTableContainer"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) { setTimeout(closeModal, 400); }">
        {% csrf_token %}

        <!-- Preserve source parameter for edit from detail page -->
        {% if source %}
        <input type="hidden" name="source" value="{{ source }}">
        {% endif %}
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Name -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Name *</label>
                <input type="text" name="name" value="{{ asset.name|default:'' }}" required
                       class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
            </div>
            
            <!-- Type -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Type</label>
                <select name="asset_type" class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
                    {% for value, label in asset_types %}
                    <option value="{{ value }}" {% if asset.asset_type == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <!-- Serial -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Serial Number</label>
                <input type="text" name="serial_number" value="{{ asset.serial_number|default:'' }}"
                       class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
            </div>
            
            <!-- Model -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Model</label>
                <input type="text" name="model" value="{{ asset.model|default:'' }}"
                       class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
            </div>
            
            <!-- Manufacturer -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Manufacturer</label>
                <input type="text" name="manufacturer" value="{{ asset.manufacturer|default:'' }}"
                       class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
            </div>
            
            <!-- Location -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Location</label>
                <input type="text" name="location" value="{{ asset.location|default:'' }}"
                       class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
            </div>
            
            <!-- Purchase Date -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Purchase Date</label>
                <input type="date" name="purchase_date" id="purchaseDate" 
                       value="{{ asset.purchase_date|date:'Y-m-d'|default:'' }}"
                       class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary"
                       hx-get="{% url 'tickets:asset_calculate_warranty' %}"
                       hx-trigger="change"
                       hx-target="#warrantyExpiryContainer"
                       hx-swap="innerHTML"
                       hx-include="#warrantyDuration">
            </div>

            <!-- Warranty Duration Dropdown -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Warranty Duration</label>
                <select name="warranty_duration" id="warrantyDuration"
                        class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary"
                        hx-get="{% url 'tickets:asset_calculate_warranty' %}"
                        hx-trigger="change"
                        hx-target="#warrantyExpiryContainer"
                        hx-swap="innerHTML"
                        hx-include="#purchaseDate">
                    <option value="0" {% if asset.warranty_duration_years == 0 %}selected{% endif %}>None</option>
                    <option value="1" {% if asset.warranty_duration_years == 1 %}selected{% endif %}>1 Year</option>
                    <option value="2" {% if asset.warranty_duration_years == 2 %}selected{% endif %}>2 Years</option>
                    <option value="3" {% if asset.warranty_duration_years == 3 %}selected{% endif %}>3 Years</option>
                    <option value="5" {% if asset.warranty_duration_years == 5 %}selected{% endif %}>5 Years</option>
                </select>
            </div>

            <!-- Warranty Expiry (auto-calculated, read-only) -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Warranty Expiry</label>
                <div id="warrantyExpiryContainer">
                    {% include "partials/warranty_expiry_input.html" with value=asset.warranty_expiry|date:'Y-m-d'|default:'' %}
                </div>
                <p class="text-xs text-text-secondary mt-1">Auto-calculated from purchase date and duration.</p>
            </div>
            
            <!-- Assigned To -->
            <div>
                <label class="block text-sm font-medium mb-1 text-text-primary">Assigned To</label>
                <select name="assigned_to" class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
                    <option value="">— Unassigned —</option>
                    {% for user in users %}
                    <option value="{{ user.pk }}" {% if asset.assigned_to_id == user.pk %}selected{% endif %}>{{ user.get_full_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Status – FULL WIDTH (outside the grid) -->
        <div class="mt-4">
            <label class="block text-sm font-medium mb-1 text-text-primary">Status</label>
            <select name="status" class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">
                {% for value, label in status_choices %}
                <option value="{{ value }}" {% if asset.status == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Notes – FULL WIDTH -->
        <div class="mt-4">
            <label class="block text-sm font-medium mb-1 text-text-primary">Notes</label>
            <textarea name="notes" rows="3" class="w-full rounded-lg border py-2 px-3 text-sm focus:outline-none focus:ring-2 bg-background border-border text-text-primary ring-primary">{{ asset.notes|default:'' }}</textarea>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-2 mt-6 pt-4 border-t" style="border-color: var(--color-border);">
            <button type="button" onclick="closeModal()" class="btn-ghost text-sm">Cancel</button>
            <button type="submit" class="btn-primary text-sm px-6 py-2 rounded-lg">
                {% if action == 'create' %}Add Asset{% else %}Save Changes{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
    // Ensure the warranty calculation works with the HTMX response
    document.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'warrantyExpiryContainer') {
            // The warranty expiry container is updated
        }
    });
</script>
